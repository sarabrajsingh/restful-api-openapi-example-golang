apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: app1-delivery-pipeline
description: Delivery pipeline for Terraform GCS bucket deployments
serialPipeline:
  stages:
  - targetId: dev
  - targetId: staging
  - targetId: prod
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: dev
description: Development environment
deployParameters:
  project_id: "app1-dev-8c0e2f7a"
  environment: "dev"
  pipeline_sa: "dev-pipeline-sa"
executionConfigs:
- usages:
  - RENDER
  - DEPLOY
  serviceAccount: "dev-pipeline-sa@app1-dev-8c0e2f7a.iam.gserviceaccount.com"
customTarget:
  customTargetType: terraform-custom-target
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: staging
description: Staging environment
deployParameters:
  project_id: "app1-test-8c0e2f7a"
  environment: "staging"
  pipeline_sa: "test-pipeline-sa"
executionConfigs:
- usages:
  - RENDER
  - DEPLOY
  serviceAccount: "test-pipeline-sa@app1-test-8c0e2f7a.iam.gserviceaccount.com"
customTarget:
  customTargetType: terraform-custom-target
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: prod
description: Production environment
deployParameters:
  project_id: "app1-prod-8c0e2f7a"
  environment: "prod"
  pipeline_sa: "prod-pipeline-sa"
executionConfigs:
- usages:
  - RENDER
  - DEPLOY
  serviceAccount: "prod-pipeline-sa@app1-prod-8c0e2f7a.iam.gserviceaccount.com"
customTarget:
  customTargetType: terraform-custom-target
---
apiVersion: deploy.cloud.google.com/v1
kind: CustomTargetType
metadata:
  name: terraform-custom-target
description: Terraform Custom Target Type
customActions:
  renderAction: terraform-render
  deployAction: terraform-deploy

