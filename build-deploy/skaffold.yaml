apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: app1-delivery-pipeline
customActions:
- name: terraform-render
  containers:
  - name: terraform-render-container
    image: google/cloud-sdk:alpine
    command: ["/bin/sh"]
    args:
    - "-c"
    - |
      set -e
      gcloud infra-manager previews create preview-${CLOUD_DEPLOY_RELEASE_ID} \
        --gcs-source="${CLOUD_DEPLOY_INPUT_GCS_PATH}" \
        --project="${project_id}" \
        --location="us-east1" \
        --service-account="projects/${project_id}/serviceAccounts/${environment}-pipeline-sa@${project_id}.iam.gserviceaccount.com"
        
      echo '' > manifest.yaml
      gsutil cp manifest.yaml "$CLOUD_DEPLOY_OUTPUT_GCS_PATH/manifest.yaml"
      echo "{\"resultStatus\": \"SUCCEEDED\", \"manifestFile\": \"$CLOUD_DEPLOY_OUTPUT_GCS_PATH/manifest.yaml\"}" > results.json
      gsutil cp results.json "$CLOUD_DEPLOY_OUTPUT_GCS_PATH/results.json"
- name: terraform-deploy
  containers:
  - name: terraform-deploy-container
    image: google/cloud-sdk:alpine
    command: ["/bin/sh"]
    args:
    - "-c"
    - |
      set -e
      gcloud infra-manager deployments apply deploy-${CLOUD_DEPLOY_RELEASE_ID} \
        --gcs-source="${CLOUD_DEPLOY_INPUT_GCS_PATH}" \
        --project="${project_id}" \
        --location="us-east1" \
        --service-account="projects/${project_id}/serviceAccounts/${environment}-pipeline-sa@${project_id}.iam.gserviceaccount.com"
        
      echo "{\"resultStatus\": \"SUCCEEDED\"}" > results.json
      gsutil cp results.json "$CLOUD_DEPLOY_OUTPUT_GCS_PATH/results.json"
