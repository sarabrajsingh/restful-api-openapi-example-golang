apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: app1-delivery-pipeline
customActions:
- name: terraform-render
  containers:
  - name: terraform-render-container
    image: google/cloud-sdk:alpine
    command: ["/bin/sh"]
    args:
    - "-c"
    - |
      set -e
      apk add --no-cache zip
      
      mkdir -p /workspace/src
      gsutil cp "$CLOUD_DEPLOY_INPUT_GCS_PATH" /workspace/source.tgz
      tar -xzvf /workspace/source.tgz -C /workspace/src
      
      cd /workspace/src/terraform
      zip -r /workspace/source.zip .
      
      gsutil cp /workspace/source.zip gs://app1-cicd-8c0e2f7a-tfstate/previews/source-${CLOUD_DEPLOY_RELEASE}-${environment}.zip
      
      PREV_ID=$(echo "p-${CLOUD_DEPLOY_RELEASE}-${environment}" | cut -c 1-39)
      gcloud infra-manager previews create ${PREV_ID} \
        --gcs-source="gs://app1-cicd-8c0e2f7a-tfstate/previews/source-${CLOUD_DEPLOY_RELEASE}-${environment}.zip" \
        --project="${project_id}" \
        --location="us-east1" \
        --service-account="projects/${project_id}/serviceAccounts/${environment}-pipeline-sa@${project_id}.iam.gserviceaccount.com"
        
      echo '' > /workspace/src/manifest.yaml
      gsutil cp /workspace/src/manifest.yaml "$CLOUD_DEPLOY_OUTPUT_GCS_PATH/manifest.yaml"
      echo "{\"resultStatus\": \"SUCCEEDED\", \"manifestFile\": \"$CLOUD_DEPLOY_OUTPUT_GCS_PATH/manifest.yaml\"}" > results.json
      gsutil cp results.json "$CLOUD_DEPLOY_OUTPUT_GCS_PATH/results.json"
- name: terraform-deploy
  containers:
  - name: terraform-deploy-container
    image: google/cloud-sdk:alpine
    command: ["/bin/sh"]
    args:
    - "-c"
    - |
      set -e
      apk add --no-cache zip
      
      mkdir -p /workspace/src
      gsutil cp "$CLOUD_DEPLOY_INPUT_GCS_PATH" /workspace/source.tgz
      tar -xzvf /workspace/source.tgz -C /workspace/src
      
      cd /workspace/src/terraform
      zip -r /workspace/source.zip .
      
      gsutil cp /workspace/source.zip gs://app1-cicd-8c0e2f7a-tfstate/previews/source-${CLOUD_DEPLOY_RELEASE}-${environment}.zip
      
      DEP_ID=$(echo "d-${CLOUD_DEPLOY_RELEASE}-${environment}" | cut -c 1-39)
      gcloud infra-manager deployments apply ${DEP_ID} \
        --gcs-source="gs://app1-cicd-8c0e2f7a-tfstate/previews/source-${CLOUD_DEPLOY_RELEASE}-${environment}.zip" \
        --project="${project_id}" \
        --location="us-east1" \
        --service-account="projects/${project_id}/serviceAccounts/${environment}-pipeline-sa@${project_id}.iam.gserviceaccount.com"
        
      echo "{\"resultStatus\": \"SUCCEEDED\"}" > results.json
      gsutil cp results.json "$CLOUD_DEPLOY_OUTPUT_GCS_PATH/results.json"
