steps:
  # Step 1: Print a Hello World success message
  - name: 'ubuntu'
    id: 'hello-world'
    script: |
      #!/usr/bin/env bash
      echo "✅ HELLO WORLD!"
      echo "🚀 The Cloud Build trigger successfully received the webhook."

  # Step 2: Verify the repository was cloned successfully
  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la
      echo "🎉 Developer Connect successfully pulled the code across the project boundary!"

  - name: Terraform Plan
    id: terraform-plan
    script: |
      bash terraform/render.sh
      cd terraform
      terraform init
      terraform validate

  # Step 3: Daisy chain call to Cloud Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-cloud-deploy'
    entrypoint: 'gcloud'
    args:
      - 'deploy'
      - 'releases'
      - 'create'
      - 'release-$SHORT_SHA'              # Dynamically names the release after the Git commit hash
      - '--delivery-pipeline=my-pipeline' # <-- UPDATE THIS to your actual pipeline name
      - '--region=us-east1'               # <-- UPDATE THIS to your pipeline's region
      - '--source=.'                      # Points Cloud Deploy to your skaffold.yaml in the root directory

options:
  logging: CLOUD_LOGGING_ONLY