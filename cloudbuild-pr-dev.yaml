steps:
  # Step 1: Print a Hello World success message
  - name: 'ubuntu'
    id: 'hello-world'
    script: |
      #!/usr/bin/env bash
      echo "✅ HELLO WORLD!"
      echo "🚀 The Cloud Build trigger successfully received the webhook."

  # Step 2: Verify the repository was cloned successfully
  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la
      echo "🎉 Developer Connect successfully pulled the code across the project boundary!"

  # Step 3: Validate the Terraform Code (Dry-Run)
  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-plan'
    script: |
      #!/bin/sh
      echo "⚙️ Rendering custom scripts..."
      sh terraform/render.sh
      
      echo "🔍 Running Terraform Plan..."
      cd terraform
      terraform init
      terraform validate

      terraform plan -var="project_id=app1-dev-dryrun" -var="environment=dev"

options:
  logging: CLOUD_LOGGING_ONLY