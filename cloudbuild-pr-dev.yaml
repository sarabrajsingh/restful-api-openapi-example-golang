steps:
  - name: 'ubuntu'
    id: 'hello-world'
    script: |
      #!/usr/bin/env bash
      echo "✅ HELLO WORLD!"
      echo "🚀 The Cloud Build trigger successfully received the webhook."

  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la
      echo "🎉 Developer Connect successfully pulled the code across the project boundary!"

  # Step 3: Pure Terraform Validation (No render.sh!)
  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-plan'
    script: |
      #!/bin/sh
      set -e
      
      echo "🔍 Running Terraform Plan for DEV..."
      cd terraform

      terraform init -reconfigure -backend-config="prefix=terraform/state/dev"

      terraform validate

      terraform plan -var="project_id=app1-dev-dryrun" -var="environment=dev"

options:
  logging: CLOUD_LOGGING_ONLY