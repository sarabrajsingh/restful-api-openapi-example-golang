steps:
  - name: 'ubuntu'
    id: 'hello-world'
    script: |
      #!/usr/bin/env bash
      echo "✅ HELLO WORLD!"

  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la

  # Step 3: Pure Terraform Validation 
  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-plan'
    script: |
      #!/bin/sh
      set -e
      
      echo "🔍 Running Terraform Plan for PROD..."
      cd terraform

      terraform init -reconfigure \
        -backend-config="bucket=app1-cicd-8c0e2f7a-tfstate" \
        -backend-config="prefix=terraform/state/prod"

      terraform validate

      terraform plan -var="project_id=app1-prod-dryrun" -var="environment=prod"

options:
  logging: CLOUD_LOGGING_ONLY