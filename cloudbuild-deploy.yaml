steps:
  # Step 1: Verify the repository was cloned successfully
  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la
      ls -la terraform/
      echo "🎉 Developer Connect successfully pulled the code!"

  # Step 2: Daisy chain call to Cloud Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-cloud-deploy'
    entrypoint: 'gcloud'
    args:
      - 'deploy'
      - 'releases'
      - 'create'
      - 'release-$SHORT_SHA'                                                       
      - '--delivery-pipeline=$_PIPELINE_NAME'             
      - '--region=$_REGION'                    
      - '--source=.'                      

options:
  logging: CLOUD_LOGGING_ONLY