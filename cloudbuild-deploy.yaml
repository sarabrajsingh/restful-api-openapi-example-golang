steps:
  # Step 1: Print a Hello World success message
  - name: 'ubuntu'
    id: 'hello-world'
    script: |
      #!/usr/bin/env bash
      echo "✅ HELLO WORLD!"
      echo "🚀 The Cloud Build trigger successfully received the webhook."

  # Step 2: Verify the repository was cloned successfully
  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la
      echo "🎉 Developer Connect successfully pulled the code across the project boundary!"

  # Step 3: Daisy chain call to Cloud Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-cloud-deploy'
    entrypoint: 'gcloud'
    args:
      - 'deploy'
      - 'releases'
      - 'create'
      - 'release-$SHORT_SHA'                                                       
      - '--delivery-pipeline=$_PIPELINE_NAME'  # <--- Updated to Cloud Build syntax            
      - '--region=$_REGION'                    # <--- Updated to Cloud Build syntax
      - '--source=.'                      

options:
  logging: CLOUD_LOGGING_ONLY