###
# $_REGION, $_PROJECT_ID and $_PIPELINE_NAME are the variables that will be passed from the trigger in GCP. These are defined via the pipeline configuration in Terraform.
# This file triggers on merges to the main branch.
###

steps:
  # Step 1: Verify the repository was cloned successfully
  - name: 'ubuntu'
    id: 'verify-clone'
    script: |
      #!/usr/bin/env bash
      echo "📁 Verifying repository contents..."
      ls -la
      ls -la terraform/
      ls -la build-deploy/
      echo "🎉 Developer Connect successfully pulled the code!"

  # Step 2: Register the Pipeline in GCP
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'register-pipeline'
    entrypoint: 'gcloud'
    args:
      - 'deploy'
      - 'apply'
      - '--file=build-deploy/clouddeploy.yaml'   # <-- Points to the nested pipeline definition
      - '--region=$_REGION'
      - '--project=$_PROJECT_ID'    

  # Step 3: Daisy chain call to trigger the release
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-cloud-deploy'
    entrypoint: 'bash'
    env:
      - 'BUILD_ID=$BUILD_ID'       
      - 'SHORT_SHA=$SHORT_SHA'     
    args:
      - '-c'
      - |
        gcloud deploy releases create release-${SHORT_SHA}-${BUILD_ID:0:8} \
          --delivery-pipeline=$_PIPELINE_NAME \
          --region=$_REGION \
          --source=. \                                       # <-- Zips the whole repo so ./terraform/ is included
          --skaffold-file=build-deploy/skaffold.yaml         # <-- Explicitly points to the nested instructions 

options:
  logging: CLOUD_LOGGING_ONLY